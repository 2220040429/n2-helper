<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>N2学习助手V11 Core</title>
<style>
body{font-family:Arial;margin:0;background:#f4f4f4;padding:10px;padding-bottom:70px}
.card{background:#fff;border-radius:12px;padding:12px;margin-bottom:10px}
.nav{position:fixed;bottom:0;left:0;right:0;background:#fff;display:flex;border-top:1px solid #ddd}
.nav button{flex:1;padding:12px;border:none;background:#fff}
.page{display:none}
.page.active{display:block}
table{width:100%;border-collapse:collapse}
td,th{border:1px solid #ddd;padding:6px}
.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.daycell{background:#e8f5e9;padding:6px;text-align:center;border-radius:4px;font-size:12px}
</style>
</head>
<body>

<div id="home" class="page active">
<div class="card" id="overview"></div>
<div class="card">
<h3>今日应复习</h3>
<div id="reviews"></div>
<button onclick="finishReview()">完成今日复习</button>
</div>
</div>

<div id="study" class="page">
<div class="card">
<h3>记录学习</h3>
学习组数 <input id="count" type="number" value="1" min="1">
<br><br>
<select id="mastery">
<option>★★★★★</option>
<option>★★★★☆</option>
<option>★★★☆☆</option>
<option>★★☆☆☆</option>
<option>★☆☆☆☆</option>
</select>
<button onclick="learn()">完成学习</button>
</div>
</div>

<div id="records" class="page">
<div class="card"><h3>学习记录</h3><div id="recordTable"></div></div>
<div class="card"><h3>复习记录</h3><div id="reviewHistory"></div></div>
</div>

<div id="calendarPage" class="page">
<div class="card">
<h3>学习日历</h3>
<div id="calendar"></div>
</div>
</div>

<div id="settings" class="page">
<div class="card">
<h3>数据管理</h3>
<button onclick="exportData()">导出备份</button>
<input type="file" id="importFile">
<button onclick="importData()">导入备份</button>
<br><br>
<input id="resetText" placeholder="输入 RESET">
<button onclick="resetAll()">重置全部数据</button>
</div>
</div>

<div class="nav">
<button onclick="showPage('home')">首页</button>
<button onclick="showPage('study')">学习</button>
<button onclick="showPage('records')">记录</button>
<button onclick="showPage('calendarPage')">日历</button>
<button onclick="showPage('settings')">我的</button>
</div>

<script>
const REVIEW=[1,3,7,14,30];

function load(){
return JSON.parse(localStorage.getItem("n2v11")||'{"days":[],"reviews":[],"reviewLogs":[]}');
}
function save(d){localStorage.setItem("n2v11",JSON.stringify(d));}

function showPage(id){
document.querySelectorAll(".page").forEach(x=>x.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

function dueList(d){
let now=new Date(),arr=[];
d.days.forEach(x=>{
REVIEW.forEach(stage=>{
let diff=Math.floor((now-new Date(x.time))/86400000);
let done=d.reviews.some(r=>r.day===x.day&&r.stage===stage);
if(diff>=stage&&!done) arr.push({day:x.day,stage:stage,over:diff-stage});
});
});
return arr;
}

function totalDays(d){
let s=new Set(d.days.map(x=>new Date(x.time).toLocaleDateString()));
return s.size;
}

function streak(d){
let dates=[...new Set(d.days.map(x=>new Date(x.time).toLocaleDateString()))].sort();
if(!dates.length) return 0;
let count=1;
for(let i=dates.length-1;i>0;i--){
let a=new Date(dates[i]);
let b=new Date(dates[i-1]);
if((a-b)/86400000===1) count++;
else break;
}
return count;
}

function render(){
let d=load();

overview.innerHTML=`
<b>当前Day：</b>${d.days.length}<br>
<b>下一组：</b>Day${d.days.length+1}<br>
<b>累计学习组数：</b>${d.days.length}<br>
<b>学习总天数：</b>${totalDays(d)}<br>
<b>连续学习天数：</b>${streak(d)}
`;

let due=dueList(d);
reviews.innerHTML=due.length?due.map(x=>`Day${x.day}（第${x.stage}天复习${x.over>0?`，已逾期${x.over}天`:''}）`).join("<br>"):"今天无复习任务";

recordTable.innerHTML="<table><tr><th>Day</th><th>掌握度</th><th>修改</th></tr>"+
d.days.map(x=>`<tr><td>Day${x.day}</td><td>${x.mastery}</td><td><select onchange="changeMastery(${x.day},this.value)"><option>★★★★★</option><option>★★★★☆</option><option>★★★☆☆</option><option>★★☆☆☆</option><option>★☆☆☆☆</option></select></td></tr>`).join("")+"</table>";

reviewHistory.innerHTML=d.reviewLogs.slice().reverse().join("<hr>")||"暂无";

calendar.innerHTML='<div class="calendar">'+d.days.map(x=>'<div class="daycell">'+x.day+'</div>').join('')+'</div>';
}

function learn(){
let d=load();
let c=parseInt(count.value)||1;
let m=mastery.value;
for(let i=0;i<c;i++){
d.days.push({day:d.days.length+1,mastery:m,time:new Date().toISOString()});
}
save(d);render();
}

function changeMastery(day,val){
let d=load();
let item=d.days.find(x=>x.day===day);
if(item)item.mastery=val;
save(d);render();
}

function finishReview(){
let d=load();
let due=dueList(d);
due.forEach(x=>d.reviews.push({...x,time:new Date().toISOString()}));
d.reviewLogs.push(new Date().toLocaleString()+"<br>"+due.map(x=>"Day"+x.day).join("、"));
save(d);render();
}

function exportData(){
let blob=new Blob([JSON.stringify(load())],{type:'application/json'});
let a=document.createElement('a');
a.href=URL.createObjectURL(blob);
a.download='N2备份.json';
a.click();
}

function importData(){
let f=importFile.files[0];
if(!f)return;
let r=new FileReader();
r.onload=e=>{localStorage.setItem("n2v11",e.target.result);render();};
r.readAsText(f);
}

function resetAll(){
if(resetText.value==="RESET"){
localStorage.removeItem("n2v11");
render();
}
}

render();
</script>
</body>
</html>
